<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Media Báo Giá</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="header">

<img src="logo.png" class="logo">

<h1 class="title">
BÁO GIÁ MEDIA SỰ KIỆN
</h1>

<p class="subtitle">
Nhận báo giá trong vòng 30 giây
</p>

</div>

<div class="card">

<h2>THÔNG TIN KHÁCH HÀNG</h2>

<input type="text" placeholder="Họ và tên">
<input type="text" placeholder="Tên công ty">
<input type="text" placeholder="Số điện thoại">
<input type="email" placeholder="Email">

</div>

<div class="card">

<h2>DỊCH VỤ MEDIA</h2>

<label>
<input type="checkbox" id="photo-half">
Chụp hình sự kiện (Buổi) - 2.500.000
</label>

<label>
<input type="checkbox" id="photo-day">
Chụp hình sự kiện (Ngày) - 4.000.000
</label>

<br><br>

<label>
<input type="checkbox" id="video-half">
Quay phim sự kiện (Buổi) - 3.500.000
</label>

<label>
<input type="checkbox" id="video-day">
Quay phim sự kiện (Ngày) - 6.000.000
</label>

<br><br>

<label>
<input type="checkbox" id="flycam-half">
Flycam (Buổi) - 1.500.000
</label>

<label>
<input type="checkbox" id="flycam-day">
Flycam (Ngày) - 2.500.000
</label>

<br><br>

<label>
Số lượng Video Recap
</label>

<input
type="number"
id="recap"
value="0"
min="0">

</div>

<div class="card">

<h2>HÓA ĐƠN VAT</h2>

<label>
<input type="checkbox" id="vat">
Xuất hóa đơn VAT (+8%)
</label>

</div>

<div class="card total-card">

<h2>TỔNG BÁO GIÁ</h2>

<p>Tạm tính</p>

<h3 id="subtotal">
0 VNĐ
</h3>

<p>VAT 8%</p>

<h3 id="vatAmount">
0 VNĐ
</h3>

<h1 id="total">
0 VNĐ
</h1>

</div>
  
</div>

<script src="script.js"></script>

</body>

</html>
